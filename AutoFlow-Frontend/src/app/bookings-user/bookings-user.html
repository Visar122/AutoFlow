<div class="bookings-list-wrapper"> 
    <h1 class="page-title">My Bookings</h1>
    <div class="timeline">
        @for (booking of mybookings; track booking) {
            <div class="timeline-item">
              <div class="timeline-icon">
                  <i class="fa-regular fa-calendar-days"></i>
               </div>

                <div class="timeline-card">
                    <div class="card-header"> 
                        <span class="customer-name">{{ booking.customerName }}</span>
                        <span class="booking-date">  {{ booking.bookingTime | slice:0:5 }} | {{ booking.bookingDate | date: 'EEEE, dd-MM-yyyy' }} </span>
                    </div>

                    <div class="card-sub">
                        <span><i class="fa-solid fa-wrench"></i> {{booking.serviceType}}</span>
                           <span><i class="fa-solid fa-car"></i>{{booking.carPlate}} </span>
                    </div>

                    <div class="note">
                        @if(booking.note) {
                            <span><i class="fa-solid fa-note-sticky"></i> {{ booking.note }}</span>
                        }
                    </div>
    
                </div>
            </div>  
        }
    </div>
</div>
